apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-deployment
spec:
  replicas: 3
  selector: 
    matchLabels:
      app: main-server
  template:
    metadata:
      labels:
        app: main-server
    spec:
      containers:
      - name: main-server
        image: express_cohort_2:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 3000
        resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests: 
              memory: "64Mi"
              cpu: "250m"