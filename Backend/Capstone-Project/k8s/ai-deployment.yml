apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: ai-deployment
  name: ai-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-server
  template:
    metadata:
      labels:
        app: ai-server
    spec:
      containers:
        - image: 208166434962.dkr.ecr.ap-south-1.amazonaws.com/ai-orchestration
          livenessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10
          name: ai-server
          ports:
            - containerPort: 3000
              name: ai-server-port
          readinessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10
          env:
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: MISTRAL_API_KEY
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 250m
              memory: 128Mi
